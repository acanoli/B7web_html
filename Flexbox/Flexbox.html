<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>

    <style>
        .container {
            display: flex;
            height: 500px;
            background-color: rgb(75, 48, 77);
            flex-direction: row;
            justify-content: space-around;
            align-items: flex-start;
            flex-wrap: wrap;
            align-content: center;
            
        }
        .container div{
            width: 100px;
            height: 100px;
            background-color: rgb(199, 189, 191);
            margin: 10px;
            padding: 10px;

        }

        
    </style>
    
</head>

<body>

    <div class="container">
        <div> 1</div>
        <div> 2</div>
        <div> 3</div>
        <div> 4</div>
        <div> 5</div>
        <div> 6</div>
        <div> 7</div>
        <div> 8</div>
        <div> 9</div>
        <div> 10</div>
        <div> 11</div>
        <div> 12</div>  
        <div> 13</div>
        <div> 14</div>
        <div> 15</div>

        
    </div>

    
</body>
</html>
